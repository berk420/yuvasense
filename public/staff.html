<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Personel — YuvaSense</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-area">
    <header class="topbar">
      <div><h1>Personel</h1><p class="topbar-sub">Öğretmen ve kreş ekibini yönetin</p></div>
      <div id="topbarActions"></div>
    </header>
    <main class="content">
      <div class="card">
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Ad Soyad</th><th>Rol</th><th>Sınıf</th><th>E-posta</th><th>Telefon</th><th>İşe Başlama</th><th></th></tr></thead>
            <tbody id="rows"><tr class="empty-row"><td colspan="7">Yükleniyor...</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head"><h3 id="modalTitle">Yeni Personel</h3><button class="modal-close" id="modalClose">&times;</button></div>
    <form id="staffForm">
      <input type="hidden" id="staffId">
      <div class="form-group"><label>Ad Soyad</label><input type="text" id="name" required></div>
      <div class="form-row">
        <div class="form-group"><label>Rol</label>
          <select id="role" required>
            <option>Müdür</option><option>Öğretmen</option><option>Yardımcı Öğretmen</option><option>Hemşire</option><option>İdari Personel</option>
          </select>
        </div>
        <div class="form-group"><label>Sınıf (opsiyonel)</label><select id="classroomId"><option value="">—</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>E-posta</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Telefon</label><input type="tel" id="phone"></div>
      </div>
      <div class="form-group"><label>İşe Başlama Tarihi</label><input type="date" id="hireDate"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Kaydet</button>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>
  let CURRENT_USER = null;

  function openModal(member) {
    document.getElementById("modalTitle").textContent = member ? "Personeli Düzenle" : "Yeni Personel";
    document.getElementById("staffId").value = member ? member.id : "";
    document.getElementById("name").value = member ? member.name : "";
    document.getElementById("role").value = member ? member.role : "Öğretmen";
    document.getElementById("classroomId").value = member ? member.classroomId || "" : "";
    document.getElementById("email").value = member ? member.email : "";
    document.getElementById("phone").value = member ? member.phone : "";
    document.getElementById("hireDate").value = member ? member.hireDate : "";
    document.getElementById("modalOverlay").classList.add("open");
  }
  function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); }
  document.getElementById("modalClose").addEventListener("click", closeModal);

  async function loadClassroomOptions() {
    const list = await Api.get("/api/classrooms");
    const sel = document.getElementById("classroomId");
    list.forEach((c) => (sel.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`));
  }

  async function loadStaff() {
    const list = await Api.get("/api/staff");
    const rows = document.getElementById("rows");
    if (!list.length) {
      rows.innerHTML = `<tr class="empty-row"><td colspan="7">Henüz personel eklenmemiş.</td></tr>`;
      return;
    }
    rows.innerHTML = list
      .map((s) => {
        const adminActions = CURRENT_USER.role === "admin"
          ? `<button class="btn btn-ghost btn-sm" data-edit="${s.id}">Düzenle</button>
             <button class="btn btn-danger btn-sm" data-del="${s.id}">Sil</button>`
          : "";
        return `
        <tr>
          <td>${escapeHtml(s.name)}</td>
          <td>${escapeHtml(s.role)}</td>
          <td>${escapeHtml(s.classroomName || "—")}</td>
          <td>${escapeHtml(s.email)}</td>
          <td>${escapeHtml(s.phone || "—")}</td>
          <td>${fmtDate(s.hireDate)}</td>
          <td class="actions">${adminActions}</td>
        </tr>`;
      })
      .join("");

    rows.querySelectorAll("[data-edit]").forEach((btn) =>
      btn.addEventListener("click", () => openModal(list.find((s) => s.id === btn.dataset.edit)))
    );
    rows.querySelectorAll("[data-del]").forEach((btn) =>
      btn.addEventListener("click", async () => {
        if (!confirm("Bu personeli silmek istediğinize emin misiniz?")) return;
        try {
          await Api.del(`/api/staff/${btn.dataset.del}`);
          showToast("Personel silindi.", "success");
          loadStaff();
        } catch (err) {
          showToast(err.message, "error");
        }
      })
    );
  }

  document.getElementById("staffForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = document.getElementById("staffId").value;
    const payload = {
      name: document.getElementById("name").value.trim(),
      role: document.getElementById("role").value,
      classroomId: document.getElementById("classroomId").value || null,
      email: document.getElementById("email").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      hireDate: document.getElementById("hireDate").value
    };
    try {
      if (id) await Api.put(`/api/staff/${id}`, payload);
      else await Api.post("/api/staff", payload);
      showToast("Personel kaydedildi.", "success");
      closeModal();
      loadStaff();
    } catch (err) {
      showToast(err.message, "error");
    }
  });

  (async function () {
    CURRENT_USER = await initShell("staff");
    await loadClassroomOptions();
    if (CURRENT_USER.role === "admin") {
      document.getElementById("topbarActions").innerHTML = `<button class="btn btn-primary" id="addBtn">+ Yeni Personel</button>`;
      document.getElementById("addBtn").addEventListener("click", () => openModal(null));
    }
    try {
      await loadStaff();
    } catch (err) {
      showToast(err.message || "Yüklenemedi.", "error");
    }
  })();
</script>
</body>
</html>
