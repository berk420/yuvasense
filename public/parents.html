<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Veliler — YuvaSense</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-area">
    <header class="topbar">
      <div><h1>Veliler</h1><p class="topbar-sub">Veli hesaplarını ve bağlı çocukları görüntüleyin</p></div>
      <div><button class="btn btn-primary" id="addBtn">+ Yeni Veli</button></div>
    </header>
    <main class="content">
      <div class="card">
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Ad Soyad</th><th>E-posta</th><th>Telefon</th><th>Çocuklar</th><th></th></tr></thead>
            <tbody id="rows"><tr class="empty-row"><td colspan="5">Yükleniyor...</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head"><h3>Yeni Veli</h3><button class="modal-close" id="modalClose">&times;</button></div>
    <form id="parentForm">
      <div class="form-group"><label>Ad Soyad</label><input type="text" id="name" required></div>
      <div class="form-row">
        <div class="form-group"><label>E-posta</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Telefon</label><input type="tel" id="phone"></div>
      </div>
      <div class="form-group"><label>Şifre</label><input type="text" id="password" placeholder="Varsayılan: Veli2026!"></div>
      <div class="form-group"><label>Bağlı Çocuklar</label><select id="childIds" multiple size="5"></select><p class="helper-text">Birden fazla seçmek için Ctrl/Cmd basılı tutun.</p></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Kaydet</button>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>
  function openModal() { document.getElementById("modalOverlay").classList.add("open"); }
  function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); }
  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("addBtn").addEventListener("click", openModal);

  async function loadChildOptions() {
    const list = await Api.get("/api/children");
    const sel = document.getElementById("childIds");
    list.forEach((c) => (sel.innerHTML += `<option value="${c.id}">${escapeHtml(c.firstName)} ${escapeHtml(c.lastName)}</option>`));
  }

  async function loadParents() {
    const list = await Api.get("/api/parents");
    const rows = document.getElementById("rows");
    if (!list.length) {
      rows.innerHTML = `<tr class="empty-row"><td colspan="5">Henüz veli eklenmemiş.</td></tr>`;
      return;
    }
    rows.innerHTML = list
      .map(
        (p) => `
        <tr>
          <td>${escapeHtml(p.name)}</td>
          <td>${escapeHtml(p.email)}</td>
          <td>${escapeHtml(p.phone || "—")}</td>
          <td>${p.children.length ? p.children.map((c) => escapeHtml(c.firstName + " " + c.lastName)).join(", ") : "—"}</td>
          <td class="actions"><button class="btn btn-danger btn-sm" data-del="${p.id}">Sil</button></td>
        </tr>`
      )
      .join("");

    rows.querySelectorAll("[data-del]").forEach((btn) =>
      btn.addEventListener("click", async () => {
        if (!confirm("Bu veli hesabını silmek istediğinize emin misiniz?")) return;
        try {
          await Api.del(`/api/parents/${btn.dataset.del}`);
          showToast("Veli silindi.", "success");
          loadParents();
        } catch (err) {
          showToast(err.message, "error");
        }
      })
    );
  }

  document.getElementById("parentForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const childIds = Array.from(document.getElementById("childIds").selectedOptions).map((o) => o.value);
    try {
      await Api.post("/api/parents", {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        password: document.getElementById("password").value.trim(),
        childIds
      });
      showToast("Veli hesabı oluşturuldu.", "success");
      closeModal();
      loadParents();
    } catch (err) {
      showToast(err.message, "error");
    }
  });

  (async function () {
    await initShell("parents");
    await loadChildOptions();
    try {
      await loadParents();
    } catch (err) {
      showToast(err.message || "Yüklenemedi.", "error");
    }
  })();
</script>
</body>
</html>
